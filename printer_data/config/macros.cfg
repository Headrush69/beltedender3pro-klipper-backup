[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(65)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(220)|float %}

    # Grab the bed type variable from the slicer
    {% set BED_TYPE = params.curr_bed_type|default("unknown")|string %}

    Set Z-Offset based on bed type
    {% if BED_TYPE == "Textured PEI Plate" %}
        SET_GCODE_OFFSET Z=-0.05
    {% elif BED_TYPE == "High Temp Plate" %}
        SET_GCODE_OFFSET Z=0.0
    {% elif BED_TYPE == "Engineering Plate" %}
        SET_GCODE_OFFSET Z=0.0
    {% else %}
        Default offset for unknown or cool plate
        SET_GCODE_OFFSET Z=0.0
    {% endif %}
    
    # Start heating
    M140 S{BED_TEMP} ; Set bed temp
    M104 S150 ; Pre-heat nozzle to prevent oozing
    
    G90 ; Use absolute coordinates
    M83 ; Extruder relative mode
    G28 ; Home all axes
    
    # Wait for bed
    M190 S{BED_TEMP}
    
   BED_MESH_CALIBRATE ADAPTIVE=1
    
    # Heat nozzle to final temp
    M104 S{EXTRUDER_TEMP}
    M109 S{EXTRUDER_TEMP}
    
    # Prime line
    G1 Z2.0 F3000 ; Move Z Axis up
    G1 X0.1 Y20 Z0.3 F5000.0 ; Move to start position
    G1 X0.1 Y200.0 Z0.3 F1500.0 E15 ; Draw first line
    G1 X0.4 Y200.0 Z0.3 F5000.0 ; Move side
    G1 X0.4 Y20 Z0.3 F1500.0 E30 ; Draw second line
    G92 E0 ; Reset Extruder
    G1 Z2.0 F3000 ; Move Z Axis up

[gcode_macro END_PRINT]
gcode:
  # Move nozzle away from print while retracting
  M83 ; Relative E
  G91 ; Relative XYZ
  G1 X-2 Y-2 Z+5 E-3 F300
  G90 ; Absolute XYZ
  M82 ; Absolute E
  M104 S0 ; turn off temperature
  M140 S0 ; turn off heatbed
  M106 S50 ; Leave fan running to protect cooling ducts.
  UPDATE_DELAYED_GCODE ID=fan_off_timer DURATION=180 ; Turn part fan off after 3 minutes
  # Present print
  G1 X5 Y235 F3000 ; present print
  # Disable steppers
  M84

[delayed_gcode fan_off_timer]
gcode:
    M107 ; Turns off the part cooling fan

[gcode_macro PRINT_START]
gcode:
    START_PRINT {rawparams}

[gcode_macro PRINT_END]
gcode:
    END_PRINT {rawparams}
